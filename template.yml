AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  UpstreamApiUrl:
    Type: String
    Default: "https://api.event.yamanashi.dev"
    Description: "Base URL of the upstream yamanashi-event-api"
  HubBaseUrl:
    Type: String
    Default: "https://hub.yamanashi.dev"
    Description: "Base URL of the Yamanashi Developer Hub frontend"
  MaxItems:
    Type: String
    Default: "30"
    Description: "Maximum number of items to include in the feed"
  CacheTtlSeconds:
    Type: String
    Default: "300"
    Description: "In-memory cache TTL (seconds) for upstream API responses"
  CustomDomainName:
    Type: String
    Default: ""
    Description: "Custom domain for the feed (e.g. feed.event.yamanashi.dev). Leave empty to skip custom domain setup."
  CertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN for CustomDomainName, must be in this stack's own region (ap-northeast-1). Required if CustomDomainName is set."

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, ""]]

Resources:
  FeedApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      EndpointConfiguration:
        Type: REGIONAL

  FeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: eventfeed-lambda
      Handler: app.main.lambda_handler
      Runtime: python3.10
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          UPSTREAM_API_URL: !Ref UpstreamApiUrl
          HUB_BASE_URL: !Ref HubBaseUrl
          MAX_ITEMS: !Ref MaxItems
          CACHE_TTL_SECONDS: !Ref CacheTtlSeconds
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        ApiGateway:
          Type: Api
          Properties:
            RestApiId: !Ref FeedApi
            Path: /{proxy+}
            Method: ANY

  FeedApiDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL

  FeedApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasCustomDomain
    # Without this, BasePathMapping can race ahead of the implicit Stage's creation.
    DependsOn: FeedApi.Stage
    Properties:
      DomainName: !Ref FeedApiDomain
      RestApiId: !Ref FeedApi
      Stage: Prod

Outputs:
  FeedApiUrl:
    Description: "API Gateway endpoint URL for the RSS feed"
    Value: !Sub "https://${FeedApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/feed.xml"
  FeedApiCustomDomainTarget:
    Condition: HasCustomDomain
    Description: "DNS target for CustomDomainName -- point a CNAME record at this value"
    Value: !GetAtt FeedApiDomain.RegionalDomainName
